<h2 mat-dialog-title>Cadastro de Fornecedor</h2>
<mat-dialog-content>
  <form [formGroup]="form">
    <mat-form-field appearance="outline">
      <mat-label>Nome Fantasia</mat-label>
      <input matInput formControlName="supplierFantasyName" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Razão Social</mat-label>
      <input matInput formControlName="supplierCorporateName" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>CNPJ</mat-label>
      <input matInput formControlName="supplierCnpj"  mask="AA.AAA.AAA/AAAA-00" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>CEP</mat-label>
      <input matInput formControlName="supplierZipCode"  mask="99999-999"  (change)="getCep(form.value.supplierZipCode)"/>
      <mat-hint>Digite o CEP para preencher o endereço</mat-hint>
  </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Endereço</mat-label>
      <input matInput formControlName="supplierAddress" />
    </mat-form-field>
    <mat-form-field appearance="outline">
        <mat-label>Cidade</mat-label>
        <input matInput formControlName="supplierCity" />
    </mat-form-field>
    <mat-form-field appearance="outline">
        <mat-label>Estado</mat-label>
        <input matInput formControlName="supplierState"  mask="AA" appUppercase />
    </mat-form-field>    
    <mat-form-field appearance="outline">
        <mat-label>Telefone</mat-label>
        <input matInput formControlName="supplierPhone"  mask="(00) 0000-0000||(00) 00000-0000" />
    </mat-form-field>
    <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput formControlName="supplierEmail"  email />
    </mat-form-field>
    <mat-form-field appearance="outline">
        <mat-label>Status</mat-label>
        <mat-select formControlName="supplierStatus">
          <mat-option value="1">Ativo</mat-option>
          <mat-option value="0">Inativo</mat-option>
        </mat-select>
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Tipo de Fornecedor</mat-label>
      <mat-select formControlName="supplierType">
        <mat-option value="1">Posto de Gasolina</mat-option>
        <mat-option value="2">Oficina Mecânica</mat-option>
      </mat-select>
  </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-button (click)="onCancel()">Cancelar</button>
  <button mat-button (click)="onSubmit()" [disabled]="form.invalid">Salvar</button>
</mat-dialog-actions>
