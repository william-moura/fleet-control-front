<h2 mat-dialog-title>Cadastro de Quilometragem</h2>

<mat-dialog-content>
  <form [formGroup]="form">
    <mat-form-field appearance="outline">
      <mat-label>Veículo</mat-label>
      <input matInput formControlName="vehicle" [disabled]="true" value="{{data.vehiclePlate}} | {{data.vehicleBrand}} | {{data.vehicleModel}}" />
      <input matInput formControlName="vehicleId" [hidden]="true" value="{{data.id}}" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Quilometragem</mat-label>
      <input matInput formControlName="kilometer" mask="separator.2" placeholder="Ex: 1.000,00" thousandSeparator="." decimalMarker="," decimalSeparator="," />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Motorista</mat-label>
      <mat-select formControlName="driverId">
        <mat-option [value]="null">Selecione um motorista</mat-option>
        @for (driver of drivers(); track driver.id) {
          <mat-option [value]="driver.id">{{driver.driverName}}</mat-option>
        }
      </mat-select>
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Data de Abastecimento</mat-label>        
        <!-- <input matInput formControlName="vehiclePurchaseDate" placeholder="Ex: 01/01/2026"> -->
        <input matInput [matDatepicker]="picker" formControlName="kilometerDate">
        <mat-hint>/DD/MM/YYYY</mat-hint>
        <mat-datepicker-toggle matIconSuffix [for]="picker" ></mat-datepicker-toggle>
        <mat-datepicker #picker></mat-datepicker>
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Notas</mat-label>
      <input matInput formControlName="kilometerNotes" />
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancelar</button>
  <button mat-flat-button color="primary" (click)="onSubmit()" [disabled]="form.invalid">Salvar</button>
</mat-dialog-actions>
