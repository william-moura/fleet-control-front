<h2 mat-dialog-title>Cadastro de Serviço de Manutenção</h2>
<mat-dialog-content>
  <form [formGroup]="form">
    <mat-form-field appearance="outline">
      <mat-label>Nome do Serviço</mat-label>
      <input matInput formControlName="maintenanceServiceName" placeholder="Ex: Troca de Óleo"/>
      <mat-error *ngIf="form.get('maintenanceServiceName')?.hasError('required')">
        O campo <strong>Nome do Serviço</strong> é obrigatório.
      </mat-error>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancelar</button>
  <button mat-flat-button color="primary" (click)="onSubmit()">
    Salvar Serviço de Manutenção
  </button>
</mat-dialog-actions>
