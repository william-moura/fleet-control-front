<div class="container-pagina">
    <div class="header-acoes">
      <h2>Gestão de Fornecedores</h2>
      <button mat-raised-button color="primary" (click)="openAddUserDialog()">
        <mat-icon>add</mat-icon> Novo Usuário
      </button>
    </div>
  
    <mat-form-field appearance="outline" class="filtro-full-width">
      <mat-label>Filtrar usuários</mat-label>
      <input matInput (keyup)="aplicarFiltro($event)" placeholder="Ex. Nome ou Email" #input>
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
  
    <div class="table-responsive">
      <table mat-table [dataSource]="dataSource" matSort>
  
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Nome </th>
          <td mat-cell *matCellDef="let row"> {{row.name}} </td>
        </ng-container>
        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Email </th>
          <td mat-cell *matCellDef="let row"> {{row.email}} </td>
        </ng-container>
        <ng-container matColumnDef="role">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Cargo </th>
          <td mat-cell *matCellDef="let row"> {{row.role.name}} </td>
        </ng-container>
        <ng-container matColumnDef="acoes" stickyEnd>
          <th mat-header-cell *matHeaderCellDef> Ações </th>
          <td mat-cell *matCellDef="let row">
            <button mat-icon-button color="accent" title="Editar" (click)="updateUser(row)">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" title="Excluir" (click)="deleteUser(row)">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>
  
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  
        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell" colspan="5">Nenhum usuário encontrado para o filtro: "{{input.value}}"</td>
        </tr>
      </table>
  
      <mat-paginator [pageSizeOptions]="[5, 10, 25]" aria-label="Selecionar página" [length]="totalRegistros" [pageSize]="pageSize" [pageIndex]="indicePagina" (page)="onPageChange($event)"></mat-paginator>
    </div>
  </div>
