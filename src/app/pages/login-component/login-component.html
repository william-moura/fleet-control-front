<div class="login-wrapper">
    <mat-card class="login-card">
      <div class="login-header">
        <div class="logo-circle">
          <mat-icon>local_shipping</mat-icon>
        </div>
        <h1>FrotaSync</h1>
        <p>Acesse o painel de gestão de frota</p>
      </div>
  
      <mat-card-content>
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
          
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>E-mail ou Usuário</mat-label>
            <input matInput formControlName="email" type="email" placeholder="exemplo@frotasync.com">
            <mat-icon matPrefix>person</mat-icon>
            <mat-error *ngIf="loginForm.get('email')?.hasError('required')">
              Usuário é obrigatório
            </mat-error>
          </mat-form-field>
  
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Senha</mat-label>
            <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password">
            <mat-icon matPrefix>lock</mat-icon>
            <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button">
              <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
            </button>
          </mat-form-field>
  
          <div class="login-actions">
            <mat-checkbox color="primary">Lembrar de mim</mat-checkbox>
            <a href="#" class="forgot-link">Esqueci a senha</a>
          </div>
  
          <button mat-flat-button color="primary" class="login-btn" [disabled]="loginForm.invalid">
            ENTRAR NO SISTEMA
          </button>
        </form>
      </mat-card-content>
  
      <mat-card-footer class="login-footer">
        <span>&copy; 2026 FrotaSync - Gestão Logística</span>
      </mat-card-footer>
    </mat-card>
  </div>
  @if (errorMessage()) {
    <div class="error-banner">
      {{ errorMessage() }}
    </div>
  }
  
  <button mat-flat-button color="primary" class="login-btn" 
          [disabled]="loginForm.invalid || isLoading()">
    @if (isLoading()) {
      <mat-spinner diameter="20"></mat-spinner>
    } @else {
      ENTRAR NO SISTEMA
    }
  </button>
