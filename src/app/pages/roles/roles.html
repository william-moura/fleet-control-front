
<div class="container-pagina">
    <div class="header-acoes">
      <h2>Gestão de Cargos</h2>
      <button mat-raised-button color="primary" (click)="openAddRoleDialog()">
        <mat-icon>add</mat-icon> Novo Cargo
      </button>
    </div>
    <div class="table-responsive">
      <table mat-table [dataSource]="dataSource" matSort>
        <ng-container matColumnDef="role">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Cargo </th>
          <td mat-cell *matCellDef="let row"> {{ row.name }} </td>
        </ng-container>
        <ng-container matColumnDef="permissions">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Permissões </th>
          <td mat-cell *matCellDef="let row"> {{ row.permissions | join }} </td>
        </ng-container>
        <ng-container matColumnDef="acoes">
          <th mat-header-cell *matHeaderCellDef> Ações </th>
          <td mat-cell *matCellDef="let row">
            <button mat-icon-button color="accent" title="Editar" (click)="updateRole(row)">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" title="Excluir" (click)="deleteRole(row)">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
      <mat-paginator 
        [pageSizeOptions]="[5, 10, 25]" 
        aria-label="Selecionar página" 
        [length]="totalRegistros" 
        [pageSize]="pageSize" 
        [pageIndex]="indicePagina" 
        (page)="onPageChange($event)">
      </mat-paginator>
    </div>
</div>
