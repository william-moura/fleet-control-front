<div class="container-pagina">
    <div class="header-acoes">
      <h2>Gestão de Multas</h2>
      <!-- <button mat-raised-button color="primary" (click)="openAddFineDialog()">
        <mat-icon>add</mat-icon> Nova Multa
      </button> -->
    </div>
    <div class="table-responsive">
      <table mat-table [dataSource]="dataSource" matSort>
        <ng-container matColumnDef="vehicle">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Veículo </th>
          <td mat-cell *matCellDef="let row"> {{row.vehicle.vehiclePlate}} - {{row.vehicle.vehicleModel}}</td>
        </ng-container>
        <ng-container matColumnDef="currentKilometers">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Quilometragem Atual </th>
          <td mat-cell *matCellDef="let row"> {{ row.kilometersValue | number:'1.2-2' }} km </td>
        </ng-container>
        <ng-container matColumnDef="totalFines">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Total de Multas </th>
          <td mat-cell *matCellDef="let row"> {{ row.vehicle.totalFines | currency:'BRL' }} </td>
        </ng-container>
        <ng-container matColumnDef="costKilometer">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Custo por Quilômetro </th>
          <td mat-cell *matCellDef="let row"> {{ row.vehicle.costKilometer | currency:'BRL' }} </td>
        </ng-container>
        <ng-container matColumnDef="acoes">
          <th mat-header-cell *matHeaderCellDef> Ações </th>
          <td mat-cell *matCellDef="let row">
            <button mat-icon-button color="accent" title="Editar" (click)="updateKilometer(row)">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" title="Excluir" (click)="deleteKilometer(row)">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
      <mat-paginator 
        [pageSizeOptions]="[5, 10, 25]" 
        aria-label="Selecionar página" 
        [length]="totalRegistros" 
        [pageSize]="pageSize" 
        [pageIndex]="indicePagina" 
        (page)="onPageChange($event)">
      </mat-paginator>
    </div>
</div>
