<h2 mat-dialog-title>Associar Motoristas ao Veículo</h2>

<mat-dialog-content>
  <p>Veículo: <strong>{{ data.placa }}</strong></p>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Selecione os Motoristas</mat-label>
    <mat-select [(ngModel)]="selectedDriverIds" multiple>
      <mat-select-trigger>
        {{ selectedDriverIds.length > 0 ? selectedDriverIds.length + ' selecionado(s)' : '' }}
      </mat-select-trigger>

      @for (m of drivers(); track m.id) {
        <mat-option [value]="m.id">{{ m.driverName }}</mat-option>
      }
    </mat-select>
    <mat-hint>Você pode selecionar vários motoristas para este veículo</mat-hint>
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close (click)="cancelSyncDriver()">Cancelar</button>
  <button mat-flat-button color="primary" (click)="confirmSyncDriver()">
    Salvar Associações ({{ selectedDriverIds.length }})
  </button>
</mat-dialog-actions>
