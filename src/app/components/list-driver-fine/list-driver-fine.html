
<table mat-table [dataSource]="dataSource">
    <ng-container matColumnDef="valor">
      <th mat-header-cell *matHeaderCellDef class="center-cell"> Valor </th>
      <td mat-cell *matCellDef="let a" class="center-cell"> 
        {{ a.fineAmount | currency:'BRL' }} 
      </td>
    </ng-container>
  
    <ng-container matColumnDef="description">
      <th mat-header-cell *matHeaderCellDef class="center-cell"> Descrição </th>
      <td mat-cell *matCellDef="let a" class="center-cell"> 
        {{ a.fineNotes }} 
      </td>
    </ng-container>
  
    <ng-container matColumnDef="veiculo">
      <th mat-header-cell *matHeaderCellDef class="center-cell"> Veículo </th>
      <td mat-cell *matCellDef="let a" class="center-cell"> 
        {{ a.vehicle?.vehiclePlate }} - {{ a.vehicle?.vehicleModel }} 
      </td>
    </ng-container>
  
    <ng-container matColumnDef="data">
      <th mat-header-cell *matHeaderCellDef class="center-cell"> Data </th>
      <td mat-cell *matCellDef="let a" class="center-cell"> 
        {{ a.fineDate | date:'dd/MM/yyyy' }} 
      </td>
    </ng-container>
  
    <ng-container matColumnDef="pontos">
      <th mat-header-cell *matHeaderCellDef class="center-cell"> Pontos </th>
      <td mat-cell *matCellDef="let a" class="center-cell"> 
        {{ a.finePoints }} 
      </td>
    </ng-container>
  
    <tr mat-header-row *matHeaderRowDef="colunas"></tr>
    <tr mat-row *matRowDef="let row; columns: colunas;"></tr>
  </table>
