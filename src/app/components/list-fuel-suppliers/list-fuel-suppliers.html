<table mat-table [dataSource]="dataSource">
  <ng-container matColumnDef="fuelSupplierDate">
    <th mat-header-cell *matHeaderCellDef> Data </th>
    <td mat-cell *matCellDef="let a"> 
      {{ a.fuelSupplierDate | date:'dd/MM/yy' }} 
    </td>
  </ng-container>

  <ng-container matColumnDef="fuelSupplierQuantity">
    <th mat-header-cell *matHeaderCellDef> Qtd </th>
    <td mat-cell *matCellDef="let a"> 
      {{ a.fuelSupplierQuantity }}L 
    </td>
  </ng-container>

  <ng-container matColumnDef="fuelSupplierTotal">
    <th mat-header-cell *matHeaderCellDef> Total </th>
    <td mat-cell *matCellDef="let a"> 
      {{ a.fuelSupplierTotal | currency:'BRL' }} 
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="colunas"></tr>
  <tr mat-row *matRowDef="let row; columns: colunas;"></tr>
</table>
