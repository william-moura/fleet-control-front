<table mat-table [dataSource]="dataSource">
    <ng-container matColumnDef="maintenanceDate">
      <th mat-header-cell *matHeaderCellDef> Data </th>
      <td mat-cell *matCellDef="let a"> 
        {{ a.maintenanceDate | date:'dd/MM/yyyy' }} 
      </td>
    </ng-container>

    <ng-container matColumnDef="maintenanceServices">
      <th mat-header-cell *matHeaderCellDef> Serviços </th>
      <td mat-cell *matCellDef="let a"> 
        {{ a.servicesFormatted }} 
      </td>
    </ng-container>
  
    <ng-container matColumnDef="maintenanceCost">
      <th mat-header-cell *matHeaderCellDef> Total </th>
      <td mat-cell *matCellDef="let a"> 
        {{ a.maintenanceCost | currency:'BRL' }} 
      </td>
    </ng-container>
  
    <tr mat-header-row *matHeaderRowDef="colunas"></tr>
    <tr mat-row *matRowDef="let row; columns: colunas;"></tr>
  </table>
