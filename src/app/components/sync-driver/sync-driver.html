<table mat-table [dataSource]="dataSource">
    <ng-container matColumnDef="driverName">
      <th mat-header-cell *matHeaderCellDef class="center-cell"> Motorista </th>
      <td mat-cell *matCellDef="let a" class="center-cell"> 
        {{ a.driverName }} 
      </td>
    </ng-container>
    <ng-container matColumnDef="driverLicenseCategory">
      <th mat-header-cell *matHeaderCellDef class="center-cell"> Categoria CNH </th>
      <td mat-cell *matCellDef="let a" class="center-cell"> 
        {{ a.driverLicenseCategory }} 
      </td>
    </ng-container>
    <ng-container matColumnDef="action">
      <th mat-header-cell *matHeaderCellDef class="center-cell"> Ação </th>
      <td mat-cell *matCellDef="let a" class="center-cell"> 
        <button mat-icon-button color="primary" title="Deletar" (click)="deleteDriver(a)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="colunas"></tr>
    <tr mat-row *matRowDef="let row; columns: colunas;"></tr>
</table>
