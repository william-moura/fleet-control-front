server {
    # Porta em que o NGINX vai escutar
    listen 80;

    # Diretório raiz onde estão os arquivos HTML/PHP/JS do site
    root /var/www/meu-site;
    index index.html index.htm;

    # Regra principal de roteamento
    location / {
        # Tenta servir o arquivo direto. Se não achar, dá erro 404
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Exemplo de Proxy Reverso (enviar requisições para uma aplicação Node.js ou Python)
    # location /api/ {
    #     proxy_pass http://localhost:3000;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }

    # Páginas de erro customizadas
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
